version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: pdfai-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pdfai
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pdfai-backend
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:Indore12@db:5432/pdfai
    depends_on:
      - db
    ports:
      - "8000:8000"

  # Optional: a containerized frontend served by Vite preview
  # frontend:
  #   working_dir: /app
  #   image: node:20-alpine
  #   container_name: pdfai-frontend
  #   volumes:
  #     - ../frontend:/app
  #   ports:
  #     - "5173:5173"
  #   command: sh -c "npm ci && npm run dev -- --host"

volumes:
  db_data: